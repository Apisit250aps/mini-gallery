components:
  schemas:
    ApiError:
      anyOf:
        - $ref: '#/components/schemas/ErrorResponse400'
        - $ref: '#/components/schemas/ErrorResponse401'
        - $ref: '#/components/schemas/ErrorResponse404'
        - $ref: '#/components/schemas/ErrorResponse409'
        - $ref: '#/components/schemas/ErrorResponse500'
    Category:
      type: object
      required:
        - id
        - name
        - slug
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CategoryCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
      description: The template for picking properties.
    CategoryUpdateRequest:
      type: object
      properties:
        name:
          type: string
      description: The template for adding optional properties.
    EmptyData:
      type: object
    ErrorResponse:
      type: object
      required:
        - success
        - message
        - error
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
    ErrorResponse400:
      type: object
      required:
        - body
      properties:
        body:
          $ref: '#/components/schemas/ErrorResponse'
    ErrorResponse401:
      type: object
      required:
        - body
      properties:
        body:
          $ref: '#/components/schemas/ErrorResponse'
    ErrorResponse404:
      type: object
      required:
        - body
      properties:
        body:
          $ref: '#/components/schemas/ErrorResponse'
    ErrorResponse409:
      type: object
      required:
        - body
      properties:
        body:
          $ref: '#/components/schemas/ErrorResponse'
    ErrorResponse500:
      type: object
      required:
        - body
      properties:
        body:
          $ref: '#/components/schemas/ErrorResponse'
    Project:
      type: object
      required:
        - id
        - title
        - slug
        - category
        - tags
        - galleries
        - displayOrder
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        galleries:
          type: array
          items:
            type: string
        displayOrder:
          type: integer
          format: int32
        location:
          type: string
        type:
          type: string
        program:
          type: string
        client:
          type: string
        siteArea:
          type: string
        builtArea:
          type: string
        design:
          type: string
        completion:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProjectCreateRequest:
      type: object
      required:
        - title
        - slug
        - category
        - tags
        - galleries
        - displayOrder
      properties:
        title:
          type: string
        slug:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        galleries:
          type: array
          items:
            type: string
        displayOrder:
          type: integer
          format: int32
        location:
          type: string
        type:
          type: string
        program:
          type: string
        client:
          type: string
        siteArea:
          type: string
        builtArea:
          type: string
        design:
          type: string
        completion:
          type: string
        description:
          type: string
      description: The template for omitting properties.
    ProjectUpdateRequest:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        galleries:
          type: array
          items:
            type: string
        displayOrder:
          type: integer
          format: int32
        location:
          type: string
        type:
          type: string
        program:
          type: string
        client:
          type: string
        siteArea:
          type: string
        builtArea:
          type: string
        design:
          type: string
        completion:
          type: string
        description:
          type: string
      description: The template for adding optional properties.
    User:
      type: object
      required:
        - id
        - name
        - isAdmin
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        isAdmin:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLogin:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
    UserCreateRequest:
      type: object
      required:
        - name
        - isAdmin
        - isActive
      properties:
        name:
          type: string
        isAdmin:
          type: boolean
        isActive:
          type: boolean
      description: The template for picking properties.
    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
        isAdmin:
          type: boolean
        isActive:
          type: boolean
      description: The template for adding optional properties.
